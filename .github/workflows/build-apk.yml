name: Build ParentMonitor Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 36 & Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: sed -i 's/\r$//' ./gradlew && chmod +x ./gradlew

      - name: Generate signing keystore
        run: |
          keytool -genkey -v -keystore release.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass guardian_2024 -keypass guardian_2024 \
            -alias guardian \
            -dname "CN=GuardianEye,OU=Dev,O=Personal,L=IN,S=IN,C=IN"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: release.jks
          STORE_PASS: guardian_2024
          KEY_ALIAS: guardian
          KEY_PASS: guardian_2024

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ParentMonitor-debug-APK-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
