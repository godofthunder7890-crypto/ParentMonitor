name: Build ParentMonitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.3'

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate Gradle Wrapper JAR (if missing)
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          gradle wrapper --gradle-version=8.3 --distribution-type=bin
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Rename APK
      run: |
        mkdir -p dist
        cp app/build/outputs/apk/debug/*.apk dist/ParentMonitor.apk
        echo "APK size: $(du -sh dist/ParentMonitor.apk)"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ParentMonitor-Debug
        path: dist/ParentMonitor.apk
        retention-days: 30

    - name: Delete old release
      run: gh release delete latest-build --yes 2>/dev/null || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create GitHub Release with APK
      run: |
        gh release create latest-build dist/ParentMonitor.apk \
          --title "ParentMonitor Latest Build" \
          --notes "Auto-built from latest commit. Install on parent device." \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Print Download URL
      run: |
        echo "================================"
        echo "DIRECT DOWNLOAD URL:"
        echo "https://github.com/${{ github.repository }}/releases/download/latest-build/ParentMonitor.apk"
        echo "================================"
