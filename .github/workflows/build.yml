name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Cache Android debug keystore (stable SHA-1)
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Print SHA-1 fingerprint (for Maps API restriction)
        run: |
          echo "============================================"
          echo "  APP SHA-1 FINGERPRINT (com.parent.monitor)"
          echo "============================================"
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            | grep -A1 "SHA1:"
          echo "============================================"
          echo "Package: com.parent.monitor"
          echo "Use this SHA-1 in Google Cloud Console"
          echo "============================================"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ParentMonitor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
