name: Build ParentMonitor APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Code ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Gradle (uses wrapper in repo — no version override) ──────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      # ── 4. Android SDK 36 (compileSdk=36, targetSdk=36) ─────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 36 + build-tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools"

      # ── 5. Project setup ────────────────────────────────────────────────────
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── 6. Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon --no-build-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true"

      # ── 7. Verify output ─────────────────────────────────────────────────────
      - name: Verify APK was produced
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "❌ ERROR: APK not found in app/build/outputs/apk/debug/"
            find app/build -name "*.apk" 2>/dev/null || echo "No APKs anywhere in app/build/"
            exit 1
          fi
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "✅ APK found: $APK  |  Size: $SIZE"

      # ── 8. Stage APK ─────────────────────────────────────────────────────────
      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/ParentMonitor.apk
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)"  >> $GITHUB_ENV

      # ── 9. Upload to Actions artifacts ───────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParentMonitor-Debug-${{ github.run_number }}
          path: dist/ParentMonitor.apk
          retention-days: 30

      # ── 10. GitHub Release ───────────────────────────────────────────────────
      - name: Delete previous latest-build release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: gh release delete latest-build --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          gh release create latest-build dist/ParentMonitor.apk \
            --title "ParentMonitor — Latest Build" \
            --notes "**Commit:** \`${{ env.SHORT_SHA }}\`  |  **Built:** ${{ env.BUILD_TIME }}

          ### Install
          1. Download **ParentMonitor.apk** below
          2. Enable *Install unknown apps* in phone settings
          3. Install on the **parent's device**
          4. Open app → scan QR or enter pair code → connect

          ### WebSocket Server
          \`wss://ws-relay-production-9ea0.up.railway.app/api/ws\`

          > ⚠️ This is a debug build. For production use, sign with a release keystore." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download URL
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "=================================================="
          echo "✅ APK DOWNLOAD:"
          echo "https://github.com/${{ github.repository }}/releases/download/latest-build/ParentMonitor.apk"
          echo "=================================================="
