name: Build ParentMonitor APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.3'

    - name: Create local.properties (Android SDK path)
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate Gradle Wrapper JAR (if missing)
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Wrapper JAR missing - generating..."
          gradle wrapper --gradle-version=8.3 --distribution-type=bin
        else
          echo "Wrapper JAR already exists"
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: ParentMonitor-Debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Show APK info
      run: |
        echo "=== Build Complete ==="
        find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
