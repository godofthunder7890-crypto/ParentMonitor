name: Build ParentMonitor APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK 36 + build-tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # Fix Windows CRLF line endings (gradlew uploaded from Windows)
      - name: Fix gradlew line endings and permissions
        run: |
          sed -i 's/\r$//' ./gradlew
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Verify APK was produced
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found!"
            find app/build -name "*.apk" 2>/dev/null || true
            exit 1
          fi
          echo "APK: $APK  |  Size: $(du -sh "$APK" | cut -f1)"

      - name: Prepare release artifact
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/*.apk dist/ParentMonitor.apk
          echo "BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ParentMonitor-Debug-${{ github.run_number }}
          path: dist/ParentMonitor.apk
          retention-days: 30

      - name: Delete previous latest-build release
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: gh release delete latest-build --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          gh release create latest-build dist/ParentMonitor.apk \
            --title "ParentMonitor — Latest Build (${{ env.SHORT_SHA }})" \
            --notes "**Commit:** \`${{ env.SHORT_SHA }}\`  |  **Built:** ${{ env.BUILD_TIME }}

          ### Install on parent device
          1. Download **ParentMonitor.apk** below
          2. Enable *Install unknown apps* in Settings
          3. Install → Open → scan QR or enter pair code

          **Relay server:** \`wss://ws-relay-production-9ea0.up.railway.app/api/ws\`" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print download URL
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "APK URL: https://github.com/${{ github.repository }}/releases/download/latest-build/ParentMonitor.apk"
